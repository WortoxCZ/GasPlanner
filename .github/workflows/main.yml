name: CI

on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Tier 1: Always runs ───────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci --legacy-peer-deps
      - run: pwsh ./build/test.ps1

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: test-results/**/*.xml

  # ─── Tier 2: PRs and master only ──────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/rollback-test'))
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci --legacy-peer-deps
      - run: pwsh ./build/e2e.ps1

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7

      - name: Publish E2E Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: test-results/e2e.xml

  # ─── Tier 3: Master merge only ────────────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [test, e2e]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/rollback-test')
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci --legacy-peer-deps
      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: release
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: write
    env:
      SITE_URL: https://dugong.online
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Save previous gh-pages commit
        id: pre-deploy
        run: echo "sha=$(git rev-parse origin/gh-pages)" >> "$GITHUB_OUTPUT"

      - name: Read expected version
        id: version
        run: echo "value=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Deploy to gh-pages
        run: pwsh ./build/deploy.ps1
        env:
          DEPLOY_VERSION: ${{ github.sha }}

      - name: Wait for deployment to go live
        run: pwsh ./build/wait-for-deploy.ps1 -ExpectedVersion ${{ steps.version.outputs.value }} -SiteUrl ${{ env.SITE_URL }}

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run production smoke test
        run: npx playwright test --project=chromium
        env:
          PLAYWRIGHT_TEST_BASE_URL: ${{ env.SITE_URL }}

      - name: Rollback on failure
        if: failure()
        run: pwsh ./build/rollback-deploy.ps1 -CommitSha ${{ steps.pre-deploy.outputs.sha }}

  # ─── Temporary: Rollback test ───────────────────────────────
  deploy-test:
    name: Deploy Test (rollback dry-run)
    runs-on: ubuntu-latest
    needs: [test, e2e, release]
    if: github.event_name == 'push' && github.ref == 'refs/heads/rollback-test'
    env:
      SITE_URL: http://localhost:4200
    steps:
      - uses: actions/checkout@v4
        with:
          ref: rollback-test
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Read expected version
        id: version
        run: |
          echo "value=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
          echo "Expecting version: $(node -p "require('./package.json').version")"

      - name: Build and serve locally
        run: |
          pwsh ./build/install-lib.ps1
          npm run build
          npx serve dist/planner -l 4200 --single --no-clipboard &
          sleep 3

      - name: Wait for deployment to go live
        run: pwsh ./build/wait-for-deploy.ps1 -ExpectedVersion ${{ steps.version.outputs.value }} -SiteUrl ${{ env.SITE_URL }} -TimeoutSeconds 30 -IntervalSeconds 3

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run production smoke test
        run: npx playwright test --project=chromium
        env:
          PLAYWRIGHT_TEST_BASE_URL: ${{ env.SITE_URL }}

      - name: Simulate rollback on failure
        if: failure()
        run: echo "ROLLBACK TRIGGERED — would run rollback-deploy.ps1 in production"
